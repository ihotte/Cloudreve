language: go
go:
  - 1.13.x
git:
  depth: 1
install:
  - go get github.com/rakyll/statik
before_script:
  - statik -src=models -f
script:
  - true
after_success:
  - true
before_deploy:
  - sudo apt-get update
  - sudo apt-get -y install gcc-aarch64-linux-gnu libc6-dev-arm64-cross
  - chmod +x ./build.sh
  - ./build.sh -d -r b
deploy:
  provider: releases
  api_key: $GITHUB_TOKEN
  file_glob: true
  file: release/*
  draft: true
  skip_cleanup: true
  on:
    tags: true